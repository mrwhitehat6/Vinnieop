<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For Vinnie ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1 class="title">Hey Vinnie ❤️</h1>
    <p class="message">
        From the moment you came into my life, everything became magical ✨<br><br>
        Your smile, your voice, your presence… everything feels like home 💖<br><br>
        I don’t know what I did to deserve you, but I promise to always cherish you 💕
    </p>

    <h2 class="question">Will you be mine forever? 💍</h2>

    <div class="buttons">
        <button id="yesBtn">YES 😍</button>
        <button id="noBtn">NO 😢</button>
    </div>
</div>

<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
